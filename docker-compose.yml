services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://ussd:ussd@db:5432/ussd
    volumes:
      - ./app.js:/app/app.js
      - ./openapi.yaml:/app/openapi.yaml
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ussd
      POSTGRES_PASSWORD: ussd
      POSTGRES_DB: ussd
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ussd"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
